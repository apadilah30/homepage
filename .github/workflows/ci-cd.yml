name: CI/CD Build & Deploy

on:
  push:
    branches: [ main, master ]

jobs:
  build:
    name: Install & Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'pnpm'

      - name: Install dependencies
        run: |
          corepack enable
          pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

  deploy-ssh:
    name: Deploy to SSH Server
    needs: build
    runs-on: ubuntu-latest
    if: ${{ secrets.SSH_HOST && secrets.SSH_USER && secrets.SSH_PRIVATE_KEY && secrets.DEPLOY_PATH }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install rsync
        run: sudo apt-get update && sudo apt-get install -y rsync

      - name: Archive repo (exclude node_modules and .git)
        run: |
          tar --exclude='.git' --exclude='node_modules' -czf repo.tar.gz .

      - name: Copy archive to server
        uses: appleboy/scp-action@v0.1.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          source: "repo.tar.gz"
          target: ${{ secrets.DEPLOY_PATH }}

      - name: Run remote deploy commands
        uses: appleboy/ssh-action@v0.1.6
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            set -e
            cd "${{ secrets.DEPLOY_PATH }}"
            tar -xzf repo.tar.gz -C .
            # Ensure pnpm is available
            if ! command -v pnpm >/dev/null 2>&1; then
              npm install -g pnpm
            fi
            pnpm install --frozen-lockfile
            pnpm build
            # Restart the app — adjust to your process manager (pm2/systemd/docker)
            if command -v pm2 >/dev/null 2>&1; then
              pm2 restart portfolio-agus || pm2 start pnpm --name portfolio-agus -- start
            fi

