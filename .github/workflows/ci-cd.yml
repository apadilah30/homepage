name: CI/CD Build & Deploy

on:
  push:
    branches: [ main, master ]

jobs:
  build:
    name: Install & Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'pnpm'

      - name: Install dependencies
        run: |
          corepack enable
          pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

  deploy-ssh:
    name: Deploy to SSH Server
    needs: build
    runs-on: ubuntu-latest
    env:
      SSH_HOST: ${{ secrets.SSH_HOST }}
      SSH_USER: ${{ secrets.SSH_USER }}
      SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
      SSH_PORT: ${{ secrets.SSH_PORT }}
      DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check required deploy secrets
        id: deploy_check
        shell: bash
        run: |
          if [ -n "$SSH_HOST" ] && [ -n "$SSH_USER" ] && [ -n "$SSH_PRIVATE_KEY" ] && [ -n "$DEPLOY_PATH" ]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "Missing one or more required secrets: SSH_HOST, SSH_USER, SSH_PRIVATE_KEY, DEPLOY_PATH"
          fi

      - name: Install rsync
        if: ${{ steps.deploy_check.outputs.ready == 'true' }}
        run: sudo apt-get update && sudo apt-get install -y rsync

      - name: Archive repo (exclude node_modules and .git)
        if: ${{ steps.deploy_check.outputs.ready == 'true' }}
        run: |
          tar --exclude='.git' --exclude='node_modules' -czf repo.tar.gz .

      - name: Copy archive to server
        if: ${{ steps.deploy_check.outputs.ready == 'true' }}
        uses: appleboy/scp-action@v0.1.3
        with:
          host: ${{ env.SSH_HOST }}
          username: ${{ env.SSH_USER }}
          key: ${{ env.SSH_PRIVATE_KEY }}
          port: ${{ env.SSH_PORT }}
          source: "repo.tar.gz"
          target: ${{ env.DEPLOY_PATH }}

      - name: Run remote deploy commands
        if: ${{ steps.deploy_check.outputs.ready == 'true' }}
        uses: appleboy/ssh-action@v0.1.6
        with:
          host: ${{ env.SSH_HOST }}
          username: ${{ env.SSH_USER }}
          key: ${{ env.SSH_PRIVATE_KEY }}
          port: ${{ env.SSH_PORT }}
          script: |
            set -e
            cd "${{ env.DEPLOY_PATH }}"
            tar -xzf repo.tar.gz -C .
            # Ensure pnpm is available
            if ! command -v pnpm >/dev/null 2>&1; then
              npm install -g pnpm
            fi
            pnpm install --frozen-lockfile
            pnpm build
            # Restart the app — adjust to your process manager (pm2/systemd/docker)
            if command -v pm2 >/dev/null 2>&1; then
              pm2 restart portfolio-agus || pm2 start pnpm --name portfolio-agus -- start
            fi

      - name: Skip deploy (missing secrets)
        if: ${{ steps.deploy_check.outputs.ready != 'true' }}
        run: echo "Skipping deploy-ssh because required secrets are missing."

